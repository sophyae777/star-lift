<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.T.A.R. Lift</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a2e;
      color: white;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: rgba(10, 10, 46, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
    }

    nav .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: white;
      text-decoration: none;
    }

    nav .logo span {
      font-family: 'Dancing Script', cursive;
      font-size: 26px;
      color: #b8b8ff;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #b8b8ff;
    }

    /* HERO */
    #hero {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1a1a4e 0%, #0a0a2e 60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .star-field {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .star-dot {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: 0.2; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.4); }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 80px;
      letter-spacing: 8px;
      color: white;
      position: relative;
      z-index: 2;
    }

    .hero-title span {
      font-family: 'Dancing Script', cursive;
      font-size: 90px;
      color: #b8b8ff;
    }

    .hero-subtitle {
      font-size: 16px;
      letter-spacing: 4px;
      color: #b8b8ff;
      margin-top: 8px;
      position: relative;
      z-index: 2;
      text-transform: uppercase;
    }

    .hero-btn {
      margin-top: 40px;
      padding: 14px 36px;
      border: 2px solid white;
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      transition: background 0.3s, color 0.3s;
    }

    .hero-btn:hover {
      background: white;
      color: #0a0a2e;
    }

    .deco-star {
      position: absolute;
      z-index: 1;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="#hero" class="logo">S.T.A.R. <span>lift</span></a>
    <ul>
      <li><a href="#about">About Us</a></li>
      <li><a href="#learn">Learn More</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section id="hero">

    <div class="star-field" id="starField"></div>

    <svg class="deco-star" style="top:15%; left:8%; width:80px;" viewBox="0 0 100 100">
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
               fill="none" stroke="#b8b8ff" stroke-width="3"/>
    </svg>

    <svg class="deco-star" style="top:20%; right:10%; width:50px;" viewBox="0 0 100 100">
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
               fill="#b8b8ff" opacity="0.5"/>
    </svg>

    <svg class="deco-star" style="bottom:20%; left:15%; width:40px;" viewBox="0 0 100 100">
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
               fill="#ffffff" opacity="0.3"/>
    </svg>

    <h1 class="hero-title">S.T.A.R. <span>lift</span></h1>
    <p class="hero-subtitle">Self Transfer Automated Raising Lift</p>
    <a href="#learn" class="hero-btn">Learn More</a>

  </section>

  <!-- CANVA EMBED (temporary placeholder) -->
  <div style="margin-top: 0px;">
    <div style="position: relative; width: 100%; height: 0; padding-top: 337.3353%;
      padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
      overflow: hidden; will-change: transform;">
      <iframe loading="lazy"
        style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
        src="https://www.canva.com/design/DAHA5QGzJds/jxe76Rq_TP8yyniy7hWKWw/view?embed"
        allowfullscreen="allowfullscreen" allow="fullscreen">
      </iframe>
    </div>
  </div>

  <!-- JAVASCRIPT -->
  <script>

    // Generate twinkling stars
    const starField = document.getElementById('starField');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.classList.add('star-dot');
      const size = Math.random() * 2 + 1;
      star.style.width  = size + 'px';
      star.style.height = size + 'px';
      star.style.top  = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay    = Math.random() * 3 + 's';
      star.style.animationDuration = (Math.random() * 2 + 2) + 's';
      starField.appendChild(star);
    }

  </script>

</body>
</html>
